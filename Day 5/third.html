<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow</title>
    <style>
        h1{
            border:5px solid red;
            text-shadow:2px 3px 2px rgb(245, 210, 115);
            box-shadow: 3px 4px 5px;
            border-radius: 4rem;
            background-color: #9fa;
            text-align:center;

        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
</body>
</html>
