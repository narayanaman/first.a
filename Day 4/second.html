<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input[name=Aman]{
            color:rgb(147, 168, 245);
            background-color: rgb(39, 210, 107);
            width:100%;
        }
        input[type=password]{
            color:black;
            background-color: white;
            width:100%;
        }
        input[type=email]{
            color:aqua;
            background-color: tomato;
            width:50%;
        }
        input[type=submit]{
            color:rgb(4, 10, 10);
            background-color: rgb(57, 213, 36);
            width:25%;
        }
        input[type=reset]{
            color:rgb(6, 12, 12);
            background-color: rgb(71, 255, 117);
            width:20%;
        }
        input:focus{
            outline:2px solid gold;
        }
    </style>
</head>
<body>
    <input type="text" name="Aman" id="name" placeholder="Enter your Name.">
    <input type="password" name="pass" id="pass" placeholder="Enter Your Password">
    <input type="email" name="eid" id="eid">
    <input type="submit" value="Save">
    <input type="reset" value="Refresh">
</body>
</html>
