<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifth - Page</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Student Form</legend>
            <table>
                <tr>
                    <td>
                        <label for="sanme">Student Name</label>
                    </td>
                    <td>
                         <input type="text" name="sname" id="sname" placeholder="Enter your Name">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="eid">Email</label>
                    </td>
                    <td><input type="email" name="eid" id="eid" placeholder="Enter your Email"></td>
                </tr>

                <tr>
                    <td><label for="Course" value="Course">Course</label></td>
                    <td>
                        <select name="" id="">
                            <option value="">Select your Course</option>
                            <option value="BCA">Bacholer of computer Application</option>
                            <option value="MCA">Master of Computer Application</option>
                            <option value="BBA">BBA</option>
                            <option value="BA">Bacholer of Arts</option>
                            <option value="B.Tech">B.Tech</option>
                        </select>
                    </td>
                </tr>
                <tr>
                   <td> <label for="number">Mobile Number</label></td>
                   <td><input type="number" name="number" id="number" placeholder="Enter Your Phone Number"></td>
                </tr>
                <tr>
                    <td><label for="student_image">student Image</label></td>
                    <td><input type="file" name="student_image" id="student-image"></td>
                </tr>
                <tr>
                    <td><label for="add">Address</label></td>
                    <td><textarea name="add" id="add" rows="5" cols="20" placeholder="Enter your address"></textarea></td>
                </tr>
                <tr>
                    <td>
                        <button type="submit">Save</button>
                    </td>
                    <td>
                        <button type="reset">Reset</button>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>

<!-- name , email, course, mobile , student image , addresss , save reset -->
